<form class="{{cssClass}}" autocomplete="off">
  <header class="sheet-header">
    <img class="profile-img" src="{{item.img}}" data-edit="img" title="{{item.name}}" />
    <div class="header-fields">
      <h1 class="charname"><input name="name" type="text" value="{{item.name}}" placeholder="{{localize 'TLGCC.Name'}}" /></h1>
      <div class="grid grid-5col">
        <div class="resource">
          <label for="system.cast.value" class="resource-label">Cast Time</label>
          <input type="text" name="system.cast.value" value="{{system.cast.value}}" data-dtype="String" />
        </div>

        <div class="resource">
          <label for="system.range.value" class="resource-label">{{localize system.range.label}}</label>
          <input type="text" name="system.range.value" value="{{system.range.value}}" data-dtype="String" />
        </div>

        <div class="resource grid-span-2">
          <label for="system.duration.value" class="resource-label">{{localize system.duration.label}}</label>
          <input type="text" name="system.duration.value" value="{{system.duration.value}}" data-dtype="String" />
        </div>
        <div class="resource">
          <label for="system.spellLevel.value" class="resource-label">Level</label>
          <input type="text" name="system.spellLevel.value" value="{{system.spellLevel.value}}" data-dtype="Number" />
        </div>
        <div class="resource">
          <label for="system.savevalue.value" class="resource-label">SV</label>
          <input type="text" name="system.savevalue.value" value="{{system.savevalue.value}}" data-dtype="String" />
        </div>
        <div class="resource">
          <label for="system.spellresist.value" class="resource-label">SR</label>
          <input type="text" name="system.spellresist.value" value="{{system.spellresist.value}}" data-dtype="String" />
        </div>
        <div class="resource">
          <label for="system.spellcomp.value" class="resource-label">Comp.</label>
          <input type="text" name="system.spellcomp.value" value="{{system.spellcomp.value}}" data-dtype="String" />
        </div>
        <div class="resource">
          <label for="system.spelldmg.value" class="resource-label">Damage</label>
          <input type="text" name="system.spelldmg.value" value="{{system.spelldmg.value}}" data-dtype="String" />
        </div>

        <div class="resource">
          <label for="system.prepared.value" class="resource-label">{{localize system.prepared.label}}</label>
          <input type="number" name="system.prepared.value" value="{{system.prepared.value}}" data-dtype="Number" />
        </div>
        <div class="resource grid-span-3">
          <label for="system.component.value" class="resource-label">Components</label>
          <input type="text" name="system.component.value" value="{{system.component.value}}" data-dtype="String" />
        </div>
        <div class="resource grid-span-2">
          <label for="system.class.value" class="resource-label">{{localize system.class.label}}</label>
          <input type="text" name="system.class.value" value="{{system.class.value}}" data-dtype="String" />
        </div>

      </div>
    </div>

  </header>

  {{!-- Sheet Body --}}
  <section class="sheet-body">
    <div class="grid grid-2col">
      <div class="resource grid-span-2">
        <label for="system.spell.summary" class="resource-label">{{localize 'TLGCC.spellSummary'}}</label>
        <input type="text" name="system.spell.summary" value="{{system.spell.summary}}" data-dtype="String" />
      </div>
    </div>
    {{!-- Description Tab --}}
    <div class="description">
      <h2 title="Click the pencil icon at far right to edit. !!Note Please place full spell data below until we get roll data working">Spell Description - Hover for important alert</h2>
      {{editor system.description target="system.description" rollData=rollData button=true owner=owner editable=editable}}
    </div>

  </section>
  {{log "CONTEXT!!!!"}} {{log this}}

</form>
