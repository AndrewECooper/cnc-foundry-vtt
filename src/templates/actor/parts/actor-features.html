<div class="cc-section">
  <div class="cc-section-header">
    <span class="cc-section-title">{{localize 'TYPES.Item.feature'}}</span>
    <a class="item-create cc-add-btn" title="Create item" data-type="feature">
      + {{localize 'TLGCC.Add'}}
    </a>
  </div>
  <table class="cc-table">
    <thead>
      <tr>
        <th>{{localize 'TYPES.Item.feature'}}</th>
        <th>{{localize 'TLGCC.Formula'}}</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      {{#each features as |item id|}}
      <tr class="item" data-item-id="{{item._id}}">
        <td>
          <div style="display: flex; align-items: center; gap: 6px;">
            <a class="rollable" data-roll-type="item">
              <img class="cc-item-img" src="{{item.img}}" title="{{item.name}}" width="24" height="24"/>
            </a>
            <span>✦ <em>{{item.name}}</em></span>
          </div>
        </td>
        <td>
          <span class="item-formula item-prop rollable"
                data-roll="{{item.system.formula.value}}"
                {{#if @root.showDetailedFormulas}}
                data-label="<b>{{item.name}}</b><br/><em>({{item.system.formula.value}})</em>"
                {{else}}
                data-label="<b>{{item.name}}</b>"
                {{/if}}
                style="font-family: ui-monospace, monospace; font-size: 11px;">
            {{item.system.formula.value}}
          </span>
        </td>
        <td>
          <div class="item-controls">
            <a class="item-control item-edit" title="Edit Item"><i class="fas fa-edit"></i></a>
            <a class="item-control item-delete" title="Delete Item"><i class="fas fa-trash"></i></a>
          </div>
        </td>
      </tr>
      {{/each}}
    </tbody>
  </table>
</div>
