<section class="resources grid grid-4col">

  <div class="resource flex-group-center">
    <label for="data.race.value" class="resource-label">{{localize data.race.label}}</label>
    <div class="resource-content flexrow flex-center flex-between">
      <input type="text" name="data.race.value" value="{{data.race.value}}" data-dtype="String"/>
    </div>
  </div>
  <div class="resource flex-group-center">
    <label for="data.size.value" class="resource-label">{{localize 'TLGCC.Size'}}</label>
    <div class="resource-content flexrow flex-center flex-between">
      <input type="text" name="data.size.value" value="{{data.size.value}}" data-dtype="String"/>
    </div>
  </div>
  <div class="resource flex-group-center">
    <label for="data.sex.value" class="resource-label">{{localize data.sex.label}}</label>
    <div class="resource-content flexrow flex-center flex-between">
      <input type="text" name="data.sex.value" value="{{data.sex.value}}" data-dtype="String"/>
    </div>
  </div>

  <div class="resource flex-group-center">
    <label for="data.age.value" class="resource-label">{{localize data.age.label}}</label>
    <div class="resource-content flexrow flex-center flex-between">
      <input type="text" name="data.age.value" value="{{data.age.value}}" data-dtype="String"/>
    </div>
  </div>
  <div class="resource flex-group-center grid-span-4">
    <label for="data.language.value" class="resource-label">{{localize 'TLGCC.language'}}</label>
    <div class="resource-content flexrow flex-center flex-between">
      <input type="text" name="data.language.value" value="{{data.language.value}}" data-dtype="String"/>
    </div>
  
<h2 title="Click the pencil icon at far right to edit.">Biography and Notes</h2></div>
</section>
